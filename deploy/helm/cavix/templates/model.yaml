{{- if and .Values.model.enabled .Values.airGapped }}
# The in-cluster, self-hosted open model (OpenAI-compatible API). In air-gapped
# mode this is the ONLY LLM Cavix can reach. It has no egress itself.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.model.service }}
  labels:
    app.kubernetes.io/name: model
    {{- include "cavix.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: model, app.kubernetes.io/part-of: cavix }
  template:
    metadata:
      labels: { app.kubernetes.io/name: model, app.kubernetes.io/part-of: cavix }
    spec:
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      containers:
        - name: model
          image: {{ .Values.model.image }}:{{ .Values.image.tag }}
          args: ["--model", {{ .Values.model.servedModel | quote }}, "--port", {{ .Values.model.port | quote }}]
          ports: [{ containerPort: {{ .Values.model.port }} }]
          resources: {{- toYaml .Values.model.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.model.service }}
  labels:
    {{- include "cavix.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: model, app.kubernetes.io/part-of: cavix }
  ports: [{ port: {{ .Values.model.port }}, targetPort: {{ .Values.model.port }} }]
{{- end }}
