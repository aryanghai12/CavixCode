<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in · Cavix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" href="/favicon.svg">
</head>
<body class="has-orbs">
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="logo"><span class="logo-mark">◆</span> Cavix</a>
    <h1 id="title">Welcome back</h1>
    <p class="muted" id="subtitle">Log in to your review dashboard</p>

    <div class="alert alert-error" id="alert"></div>

    <a class="btn btn-github btn-block" href="/api/auth/github/start">
      <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Continue with GitHub
    </a>
    <div class="divider">or</div>

    <form id="form">
      <div class="field" id="nameField" style="display:none">
        <label for="name">Your name</label>
        <input id="name" type="text" autocomplete="name" placeholder="Ada Lovelace">
      </div>
      <div class="field" id="orgField" style="display:none">
        <label for="org">Organization</label>
        <input id="org" type="text" autocomplete="organization" placeholder="acme-inc">
        <div class="hint">Your workspace name. The first person to sign up becomes the owner.</div>
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input id="email" type="email" autocomplete="email" required placeholder="you@company.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
        <div class="hint" id="pwHint" style="display:none">At least 8 characters.</div>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="submit">Log in</button>
    </form>

    <p class="auth-alt" id="switch">New to Cavix? <a href="/signup" id="switchLink">Create an account</a></p>
  </div>
</div>
<script src="/auth.js"></script>
</body>
</html>
